name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (CPU torch, no GPU)
        run: |
          python -m pip install --upgrade pip
          # CPU-only torch so CI needs no GPU and stays small.
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          # Include the web extra so the playground TestClient tests run in CI too.
          pip install -e ".[test,dev,web]"

      - name: Ruff lint
        run: ruff check src tests bench web/server.py

      - name: Ruff format
        run: ruff format --check src tests bench

      - name: Mypy
        run: mypy src

      - name: Pytest (CPU, no downloads)
        env:
          HF_HUB_OFFLINE: "1"
          TRANSFORMERS_OFFLINE: "1"
        run: pytest -q

  package:
    name: build + install wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Build sdist + wheel and validate metadata
        run: |
          python -m pip install --upgrade pip build "twine>=5" "packaging>=24.2"
          python -m build
          python -m twine check dist/*
      - name: Install the wheel in a fresh venv and smoke-test the entry point
        run: |
          python -m venv /tmp/venv
          /tmp/venv/bin/pip install --upgrade pip
          /tmp/venv/bin/pip install torch --index-url https://download.pytorch.org/whl/cpu
          /tmp/venv/bin/pip install dist/*.whl
          /tmp/venv/bin/streamllm --version
          # py.typed must ship (PEP 561) so downstream type-checkers see our types.
          /tmp/venv/bin/python -c "import importlib.util, streamllm; \
            assert importlib.util.find_spec('streamllm') is not None; \
            import pathlib, streamllm as s; \
            assert (pathlib.Path(s.__file__).parent / 'py.typed').exists(), 'py.typed missing'; \
            print('streamllm', s.__version__, 'installed + typed')"
